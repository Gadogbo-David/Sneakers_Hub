 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="Images/Favricon.png" type="image/x-icon">
    <link rel="stylesheet" href="Stylesheet.css">
    <title> SNEAKERS HUB </title>
 </head>
 <body>
        
    <!--  Main Navbar  -->
      <nav class="MainNav">
           
    <!-- Top Navbar -->
        <div class="top-navBar">
               
            <!-- Logo -->
            <div class="navLogo">
                <h2>.SNEAKERS HUB</h2>
            </div>

            <!--  Search -->
              <div class="navSearch">
                
                <input type="text" placeholder="Search" class="searchInput">

                <div class="searchImage">
                  <img src="Images/search image.png" alt="A Search Image" width="25" height="25">
                </div>

              </div>
            
            <!--  Offers -->
              <div class="limitedOffer">
                <h3 > Limited Offer </h3>
              </div>
                 
            </div>
        
    <!-- Bottom Navbar -->
        <div class="bottom-navBar">
            
            <p class="bottonElements"> BALENCIAGA </p>
            <p class="bottonElements"> AIR FORCE </p>
            <p class="bottonElements"> NEW BALANCE </p>
            <p class="bottonElements"> NIKE </p>
            <p class="bottonElements"> TIMBERLAND </p>

        </div>

    
      </nav>

      <!-- Slider -->
       <div class="slider">
         
        <div class="sliderMainElements">

            <!-- Balenciaga Elements -->
             <div class="Sliderelement">
                <h2 class="sliderTitle" id="balenciagaTitle"> BALENCIAGA  <br> LATEST <br> DROP </h3>
                <span class="sliderBG"></span>
                <img src="Images/Balenciaga blue 1.png" alt=" Balenciaga Picture " class="sliderPicture" id="balenciagaPicture">
                <p class="sliderPrice" id="balenciagaPrice"> $350</p>
                <button class="sliderBuyButton" id="balenciagaBuyButton"> BUY NOW </button>
             </div>

             <!-- AirForce Elements -->
             <div class="Sliderelement">
                <h2 class="sliderTitle" id="airForceTitle"> AIR FORCE  <br> NEW <br> SEASON </h3>
                <span class="sliderBG"></span>
                <img src="Images/Airforce black 2.png" alt=" Airforce Picture " class="sliderPicture" id="airforcePicture">
                <p class="sliderPrice" id="airforcePrice"> $550</p>
                <button class="sliderBuyButton" id="airforceBuyButton"> BUY NOW </button>
             </div>
            
             <!-- New Balance Elements -->
             <div class="Sliderelement">
                <h2 class="sliderTitle" id="newBalanceTitle"> NEW BALANCE  <br> LATEST <br> EDITION </h3>
                <span class="sliderBG"></span>
                <img src="Images/New balance brown 1.png" alt=" New Balance Picture " class="sliderPicture" id="newBalancePicture">
                <p class="sliderPrice" id="newBalancePrice"> $800</p>
                <button class="sliderBuyButton" id="newBalanceBuyButton"> BUY NOW </button>
             </div>
            
             <!-- Nike Elements -->
             <div class="Sliderelement">
                <h2 class="sliderTitle" id="nikeTitle"> NIKE  <br> NEW <br> ARRIVALS </h3>
                <span class="sliderBG"></span>
                <img src="Images/Nike green 1.png" alt=" Nike Picture " class="sliderPicture" id="nikePicture">
                <p class="sliderPrice" id="nikePrice"> $150</p>
                <button class="sliderBuyButton" id="nikeBuyButton"> BUY NOW </button>
             </div>
            
             <!-- Timberland Elements -->
             <div class="Sliderelement">
                <h2 class="sliderTitle" id="timberlandTitle"> TIMBERLAND <br> OLD <br> SEASON </h3>
                <span class="sliderBG"></span>
                <img src="Images/Timberland Black 1.png" alt=" Timberland Picture " class="sliderPicture" id="timberlandPicture">
                <p class="sliderPrice" id="timberlandPrice"> $350</p>
                <button class="sliderBuyButton" id="timberlandBuyButton"> BUY NOW </button>
             </div>

        </div>

       </div>

    <script src="app.js"></script>
 </body>
 </html>
